<div style="display:flex; align-items:flex-start; justify-content:space-between;">
<div>
<div style="display:flex; align-items:center; gap:0.6rem;">
  <a href="{{ "" | relURL }}" class="title" style="text-decoration:none;">
    <h2>{{ .Site.Title }}</h2>
  </a>
  {{ with .Site.Params.github }}
  <a href="{{ . }}" target="_blank" rel="noopener" aria-label="GitHub" style="color:var(--text-color); opacity:0.6; display:flex; align-items:center;" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.6">
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>
  </a>
  {{ end }}
  {{ with .Site.Params.linkedin }}
  <a href="{{ . }}" target="_blank" rel="noopener" aria-label="LinkedIn" style="color:var(--text-color); opacity:0.6; display:flex; align-items:center;" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.6">
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>
  </a>
  {{ end }}
  {{ with .Site.Params.email }}
  <a href="{{ . }}" aria-label="Email" style="color:var(--text-color); opacity:0.6; display:flex; align-items:center;" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.6">
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
  </a>
  {{ end }}
</div>
<nav>{{- partial "nav.html" . -}}</nav>
</div>
{{ if and .IsHome .Site.Params.portrait }}
<img src="{{ .Site.Params.portrait }}" alt="Portrait" style="width:160px; height:160px; object-fit:cover; border-radius:50%; flex-shrink:0;" />
{{ end }}
</div>
